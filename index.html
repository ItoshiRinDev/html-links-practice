<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html practice</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        background: #1a1a1a;
        color: #f0f0f0;
    }
    img {
        width: 300px;
        height: auto;
        margin: 10px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(255,51,102,0.3);
    }
    a {
        display: block;
        margin: 20px 0;
        color: #ff3366;
        text-decoration: none;
        font-weight: bold;
    }
    a:hover {
        text-decoration: underline;
    }
    .quote-list {
        list-style: none;
        padding: 0;
        display: grid;
        gap: 20px;
    }
    .quote-list li {
        background: rgba(255,255,255,0.1);
        padding: 20px;
        border-radius: 10px;
        border-left: 4px solid #ff3366;
    }
    blockquote {
        margin: 0 0 10px 0;
        font-size: 1.2rem;
        line-height: 1.5;
    }
    cite {
        display: block;
        text-align: right;
        color: #ff3366;
        font-style: normal;
    }
</style>
</head>
<body>
  <img src="https://media1.tenor.com/m/pBdK9cNDaLAAAAAC/rin-itoshi-rin.gif " alt="рин итоиш" width="300px">
  <img src="https://i.pinimg.com/736x/e5/e4/4c/e5e44c969c868337c6a91e6ebfb769c5.jpg" alt="рин итоиш" width="300px">
  <img src="https://i.pinimg.com/originals/89/32/42/89324258c587406654fd4859b62cbdbb.jpg?nii=" alt="рин итоиш" width="300px">
  <a href="./index3.html" target="_blank">Мой второй проект</a>
  <ul class="quote-list">
    <li>
      <blockquote>Уничтожить Итоши Саэ — это всё, ради чего я играю в футбол</blockquote>
      <cite>Рин итоши</cite>
    </li>
    <li>
      <blockquote>Вы такие неженки, что это меня просто убивает</blockquote>
      <cite>Рин итоши</cite>
    </li>
    <li>
      <blockquote>Для меня футбол — это «убей или умри»</blockquote>
      <cite>Рин итоши</cite>
    </li>
  </ul>
</body>
</html>
